name: Update World Cup Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch data
        env:
          FOOTBALL_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          NEWS_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          curl -s -H "X-Auth-Token: $FOOTBALL_KEY" "https://api.football-data.org/v4/competitions/WC/matches" -o matches.json
          curl -s -H "X-Auth-Token: $FOOTBALL_KEY" "https://api.football-data.org/v4/competitions/WC/standings" -o standings.json
          curl -s -H "X-Auth-Token: $FOOTBALL_KEY" "https://api.football-data.org/v4/competitions/WC/scorers?limit=15" -o scorers.json
          curl -s "https://gnews.io/api/v4/search?q=%22World+Cup+2026%22&lang=en&max=12&sortby=publishedAt&token=$NEWS_KEY" -o news.json

      - name: Merge into data.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const matches   = JSON.parse(fs.readFileSync('matches.json',   'utf8'));
            const standings = JSON.parse(fs.readFileSync('standings.json', 'utf8'));
            const scorers   = JSON.parse(fs.readFileSync('scorers.json',   'utf8'));
            const news      = JSON.parse(fs.readFileSync('news.json',      'utf8'));
            const out = {
              updated:   new Date().toISOString(),
              matches,
              standings,
              scorers,
              news
            };
            fs.writeFileSync('data.json', JSON.stringify(out));
            console.log('Written:', matches.matches?.length, 'matches,', news.articles?.length, 'articles');

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "data: update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase origin main
          git push
