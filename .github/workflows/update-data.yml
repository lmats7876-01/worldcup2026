name: Update World Cup Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch data
        env:
          FOOTBALL_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          NEWS_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          curl -s -H "X-Auth-Token: $FOOTBALL_KEY" "https://api.football-data.org/v4/competitions/WC/matches" -o matches_raw.json
          curl -s -H "X-Auth-Token: $FOOTBALL_KEY" "https://api.football-data.org/v4/competitions/WC/standings" -o standings_raw.json
          curl -s -H "X-Auth-Token: $FOOTBALL_KEY" "https://api.football-data.org/v4/competitions/WC/scorers?limit=15" -o scorers_raw.json
          curl -s "https://gnews.io/api/v4/search?q=%22World+Cup+2026%22&lang=en&max=12&sortby=publishedAt&token=$NEWS_KEY" -o news_raw.json

      - name: Slim and merge into data.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw_m  = JSON.parse(fs.readFileSync('matches_raw.json',   'utf8'));
            const raw_st = JSON.parse(fs.readFileSync('standings_raw.json', 'utf8'));
            const raw_sc = JSON.parse(fs.readFileSync('scorers_raw.json',   'utf8'));
            const raw_n  = JSON.parse(fs.readFileSync('news_raw.json',      'utf8'));

            // Slim matches — only keep fields the dashboard uses
            const matches = (raw_m.matches || []).map(m => ({
              utcDate:  m.utcDate,
              status:   m.status,
              group:    m.group,
              stage:    m.stage,
              homeTeam: { name: m.homeTeam.name, shortName: m.homeTeam.shortName, tla: m.homeTeam.tla },
              awayTeam: { name: m.awayTeam.name, shortName: m.awayTeam.shortName, tla: m.awayTeam.tla },
              score:    m.score
            }));

            // Slim standings — only keep fields the dashboard uses
            const standings = (raw_st.standings || [])
              .filter(s => s.type === 'TOTAL')
              .map(s => ({
                group: s.group,
                type:  s.type,
                table: s.table.map(t => ({
                  position:    t.position,
                  points:      t.points,
                  playedGames: t.playedGames,
                  won:         t.won,
                  draw:        t.draw,
                  lost:        t.lost,
                  goalsFor:    t.goalsFor,
                  goalsAgainst:t.goalsAgainst,
                  team: { name: t.team.name, shortName: t.team.shortName, tla: t.team.tla }
                }))
              }));

            // Slim scorers
            const scorers = (raw_sc.scorers || []).map(s => ({
              goals:  s.goals,
              player: { name: s.player.name },
              team:   { name: s.team.name, shortName: s.team.shortName }
            }));

            // Slim news
            const articles = (raw_n.articles || []).map(a => ({
              title:       a.title,
              url:         a.url,
              image:       a.image,
              publishedAt: a.publishedAt,
              source:      a.source?.name || a.source || ''
            }));

            const out = {
              updated:   new Date().toISOString(),
              matches,
              standings,
              scorers,
              articles
            };

            const json = JSON.stringify(out);
            fs.writeFileSync('data.json', json);
            console.log('data.json:', Math.round(json.length/1024) + 'KB,', matches.length, 'matches,', articles.length, 'articles');

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "data: update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase origin main
          git push
