name: Update World Cup Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest data.json
        run: git pull --rebase origin main

      - name: Fetch scores and standings
        env:
          FOOTBALL_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          curl -s -H "X-Auth-Token: $FOOTBALL_KEY" "https://api.football-data.org/v4/competitions/WC/matches" -o matches_raw.json
          curl -s -H "X-Auth-Token: $FOOTBALL_KEY" "https://api.football-data.org/v4/competitions/WC/standings" -o standings_raw.json
          curl -s -H "X-Auth-Token: $FOOTBALL_KEY" "https://api.football-data.org/v4/competitions/WC/scorers?limit=15" -o scorers_raw.json

      - name: Fetch last 5 match details
        env:
          FOOTBALL_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const exec = require('util').promisify(require('child_process').exec);

            const raw = JSON.parse(fs.readFileSync('matches_raw.json', 'utf8'));
            const finished = (raw.matches || [])
              .filter(m => m.status === 'FINISHED')
              .sort((a, b) => new Date(b.utcDate) - new Date(a.utcDate))
              .slice(0, 5);

            const details = [];
            for (const m of finished) {
              try {
                const { stdout } = await exec(
                  `curl -s -H "X-Auth-Token: ${process.env.FOOTBALL_KEY}" "https://api.football-data.org/v4/matches/${m.id}"`
                );
                const detail = JSON.parse(stdout);
                details.push(detail);
                console.log('Fetched:', m.homeTeam.name, 'vs', m.awayTeam.name, '— goals:', detail.goals?.length || 0);
                // Small delay to avoid rate limit
                await new Promise(r => setTimeout(r, 700));
              } catch(e) {
                console.log('Failed match', m.id, e.message);
              }
            }

            fs.writeFileSync('match_details.json', JSON.stringify(details));
            console.log('Saved', details.length, 'match details');

      - name: Build data.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw_m  = JSON.parse(fs.readFileSync('matches_raw.json',   'utf8'));
            const raw_st = JSON.parse(fs.readFileSync('standings_raw.json', 'utf8'));
            const raw_sc = JSON.parse(fs.readFileSync('scorers_raw.json',   'utf8'));

            const matches = (raw_m.matches || []).map(m => ({
              utcDate: m.utcDate, status: m.status, group: m.group, stage: m.stage, id: m.id,
              homeTeam: { name: m.homeTeam.name, shortName: m.homeTeam.shortName, tla: m.homeTeam.tla },
              awayTeam: { name: m.awayTeam.name, shortName: m.awayTeam.shortName, tla: m.awayTeam.tla },
              score: m.score
            }));

            const standings = (raw_st.standings || [])
              .filter(s => s.type === 'TOTAL')
              .map(s => ({
                group: s.group, type: s.type,
                table: s.table.map(t => ({
                  position: t.position, points: t.points, playedGames: t.playedGames,
                  won: t.won, draw: t.draw, lost: t.lost,
                  team: { name: t.team.name, shortName: t.team.shortName, tla: t.team.tla }
                }))
              }));

            const scorers = (raw_sc.scorers || []).map(s => ({
              goals: s.goals,
              player: { name: s.player.name },
              team: { name: s.team.name, shortName: s.team.shortName }
            }));

            // Preserve existing articles
            let articles = [];
            try {
              const d = JSON.parse(fs.readFileSync('data.json', 'utf8'));
              articles = Array.isArray(d.articles) ? d.articles : [];
            } catch(e) {}

            // Read match details
            let matchDetails = [];
            try {
              const raw = JSON.parse(fs.readFileSync('match_details.json', 'utf8'));
              matchDetails = raw.map(m => ({
                id: m.id, utcDate: m.utcDate, status: m.status,
                group: m.group, stage: m.stage,
                homeTeam: { name: m.homeTeam?.name, shortName: m.homeTeam?.shortName, tla: m.homeTeam?.tla },
                awayTeam: { name: m.awayTeam?.name, shortName: m.awayTeam?.shortName, tla: m.awayTeam?.tla },
                score: m.score,
                goals: (m.goals || []).map(g => ({
                  minute: g.minute, type: g.type,
                  team:   { name: g.team?.name },
                  scorer: { name: g.scorer?.name },
                  assist: g.assist ? { name: g.assist?.name } : null
                }))
              }));
            } catch(e) { console.log('No match details:', e.message); }

            const out = { updated: new Date().toISOString(), matches, standings, scorers, articles, matchDetails };
            fs.writeFileSync('data.json', JSON.stringify(out));
            console.log('Written:', matches.length, 'matches,', matchDetails.length, 'details,', articles.length, 'articles');

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "scores: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase origin main
          git push
